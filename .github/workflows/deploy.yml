# GitHub Actions — Deploy to VPS
# Copy to .github/workflows/deploy.yml to activate.
#
# Required GitHub secrets:
#   VPS_HOST       — Server IP or hostname
#   VPS_USER       — SSH user (e.g. meetr)
#   VPS_SSH_KEY    — Private SSH key for VPS_USER

name: Deploy

on:
  push:
    branches:
      - deploy/prod
      - deploy/test
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Run lint and tests first
  # ---------------------------------------------------------------------------
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ---------------------------------------------------------------------------
  # Deploy to production
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Production
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy/prod'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/webfixeet
            git fetch origin deploy/prod
            git checkout deploy/prod
            git reset --hard origin/deploy/prod
            git clean -ffd

            # Build and restart
            docker compose -f deploy/docker-compose.prod.yml build --no-cache
            docker compose -f deploy/docker-compose.prod.yml up -d --remove-orphans

            # Health check — retry up to 30s for container startup
            echo "=== Health Check ==="
            for i in 1 2 3 4 5 6; do
              if curl -sf -o /dev/null http://localhost:3001/; then
                echo "[OK] webfixeet is healthy"
                exit 0
              fi
              echo "Attempt $i: waiting for container..."
              sleep 5
            done
            echo "[FAIL] webfixeet did not start within 30s"
            docker compose -f deploy/docker-compose.prod.yml logs --tail=50
            exit 1

  # ---------------------------------------------------------------------------
  # Deploy to staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy/test'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/webfixeet
            git fetch origin deploy/test
            git checkout deploy/test
            git reset --hard origin/deploy/test
            git clean -ffd

            # Build and restart
            docker compose -f deploy/docker-compose.prod.yml build --no-cache
            docker compose -f deploy/docker-compose.prod.yml up -d --remove-orphans

            # Health check — retry up to 30s for container startup
            echo "=== Staging Health Check ==="
            for i in 1 2 3 4 5 6; do
              if curl -sf -o /dev/null http://localhost:3001/; then
                echo "[OK] webfixeet staging is healthy"
                exit 0
              fi
              echo "Attempt $i: waiting for container..."
              sleep 5
            done
            echo "[FAIL] webfixeet staging did not start within 30s"
            docker compose -f deploy/docker-compose.prod.yml logs --tail=50
            exit 1
