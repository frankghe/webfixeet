# GitHub Actions — Deploy to VPS
# Copy to .github/workflows/deploy.yml to activate.
#
# Required GitHub secrets:
#   VPS_HOST       — Server IP or hostname
#   VPS_USER       — SSH user (e.g. meetr)
#   VPS_SSH_KEY    — Private SSH key for VPS_USER

name: Deploy

on:
  push:
    branches:
      - deploy/prod
      - deploy/test
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Run lint and tests first
  # ---------------------------------------------------------------------------
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ---------------------------------------------------------------------------
  # Deploy to production
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Production
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy/prod'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/webfixeet
            git fetch origin deploy/prod
            git checkout deploy/prod
            git reset --hard origin/deploy/prod
            git clean -fd

            # Verify clean state
            echo "=== Verifying about page ==="
            cat src/app/\[locale\]/about/page.tsx | head -10
            echo "=== Git status ==="
            git status

            # Full Docker cleanup and rebuild
            docker compose -f deploy/docker-compose.prod.yml down --rmi all || true
            docker builder prune -af
            docker compose -f deploy/docker-compose.prod.yml build --no-cache --progress=plain
            docker compose -f deploy/docker-compose.prod.yml up -d --remove-orphans

            # Wait for container to start
            sleep 5

            # Health check
            echo "=== Health Check ==="
            curl -sf -o /dev/null -w "%{http_code}" http://localhost:3001/ && echo " [OK] webfixeet" || echo " [FAIL] webfixeet"

  # ---------------------------------------------------------------------------
  # Deploy to staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy/test'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/webfixeet
            git fetch origin deploy/test
            git checkout deploy/test
            git reset --hard origin/deploy/test
            git clean -fd

            # Prune Docker build cache and build fresh
            docker builder prune -af
            docker compose -f deploy/docker-compose.prod.yml build --no-cache
            docker compose -f deploy/docker-compose.prod.yml up -d --remove-orphans

            # Wait for container to start
            sleep 5

            # Health check
            echo "=== Staging Health Check ==="
            curl -sf -o /dev/null -w "%{http_code}" http://localhost:3001/ && echo " [OK] webfixeet" || echo " [FAIL] webfixeet"
