# GitHub Actions — Auto-deploy blog content
# Triggered when the CMS commits to the `blog` branch.
# Merges blog changes into both `main` (sync) and `deploy/prod` (deploy).

name: Blog Deploy

on:
  push:
    branches:
      - blog

permissions:
  contents: write

jobs:
  merge-and-deploy:
    name: Merge blog into main & deploy/prod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge blog into main
        run: |
          git checkout main
          git merge origin/blog --no-edit -m "chore: merge blog content into main"
          git push origin main

      - name: Merge blog into deploy/prod
        run: |
          git checkout deploy/prod
          git merge origin/blog --no-edit -m "chore: merge blog content into deploy/prod"
          git push origin deploy/prod
