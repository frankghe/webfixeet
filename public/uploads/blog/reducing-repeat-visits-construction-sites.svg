<svg viewBox="0 0 480 270" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-rrv" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="#737373" stroke-width="0.3" stroke-opacity="0.2" fill="none"/>
    </pattern>
  </defs>
  <rect width="480" height="270" fill="url(#grid-rrv)"/>

  <!-- Building silhouette -->
  <rect x="155" y="48" width="170" height="180" rx="4" fill="#e5e5e5" fill-opacity="0.5"/>
  <rect x="153" y="46" width="170" height="180" rx="4" stroke="#171717" stroke-width="2"/>
  <rect x="153" y="46" width="170" height="24" rx="4" fill="#737373" fill-opacity="0.12"/>
  <text x="238" y="63" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#737373" letter-spacing="1" font-weight="600">SITE A</text>

  <!-- Floor dividers -->
  <line x1="153" y1="100" x2="323" y2="100" stroke="#737373" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="4 4"/>
  <line x1="153" y1="148" x2="323" y2="148" stroke="#737373" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="4 4"/>
  <line x1="153" y1="196" x2="323" y2="196" stroke="#737373" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="4 4"/>

  <!-- Windows -->
  <rect x="168" y="74" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="168" y="122" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="168" y="170" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="200" y="74" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="200" y="122" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="200" y="170" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="236" y="74" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="236" y="122" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="236" y="170" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="270" y="74" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="270" y="122" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>
  <rect x="270" y="170" width="20" height="16" rx="2" stroke="#171717" stroke-width="1.1" fill-opacity="0"/>

  <!-- Ground line -->
  <rect x="143" y="226" width="192" height="7" rx="2" fill="#737373" fill-opacity="0.15"/>
  <line x1="143" y1="226" x2="335" y2="226" stroke="#171717" stroke-width="1.5"/>

  <!-- Big green checkmark badge -->
  <circle cx="323" cy="68" r="26" fill="#e5e5e5" fill-opacity="0.9" stroke="#3b82f6" stroke-width="2.5"/>
  <polyline points="311,68 320,77 336,57" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- LEFT: Person with toolbox -->
  <circle cx="92" cy="175" r="38" fill="#e5e5e5" fill-opacity="0.3" stroke="#737373" stroke-width="0.8" stroke-opacity="0.3"/>
  <circle cx="92" cy="154" r="12" stroke="#171717" stroke-width="1.5" fill="#e5e5e5" fill-opacity="0.4"/>
  <!-- Hard hat -->
  <path d="M82 152 Q92 142 102 152 L103 157 L81 157 Z" stroke="#171717" stroke-width="1.2" fill="#3b82f6" fill-opacity="0.3"/>
  <line x1="80" y1="157" x2="104" y2="157" stroke="#171717" stroke-width="1.2"/>
  <!-- Body -->
  <path d="M76 197 Q76 180 92 180 Q108 180 108 197" stroke="#171717" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Arm holding toolbox -->
  <line x1="108" y1="185" x2="122" y2="192" stroke="#171717" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Toolbox -->
  <rect x="118" y="190" width="26" height="18" rx="3" stroke="#171717" stroke-width="1.4" fill="#e5e5e5" fill-opacity="0.5"/>
  <rect x="124" y="186" width="14" height="6" rx="2" stroke="#171717" stroke-width="1.2" fill="none"/>
  <line x1="118" y1="199" x2="144" y2="199" stroke="#171717" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="127" y1="202" x2="135" y2="202" stroke="#737373" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="131" y1="198" x2="131" y2="206" stroke="#737373" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 1st VISIT badge -->
  <rect x="62" y="217" width="60" height="20" rx="6" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="92" y="230" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#3b82f6" font-weight="700" letter-spacing="0.5">1ST VISIT</text>

  <!-- RIGHT: Crossed-out repeat loop arrow -->
  <path d="M380 110 C415 110 430 145 415 175 C400 205 370 210 355 195" stroke="#737373" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="6 4" fill="none"/>
  <path d="M347 202 L357 193 L361 205" stroke="#737373" stroke-width="1.8" stroke-opacity="0.45" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="410" y="155" text-anchor="middle" font-size="7.5" font-family="sans-serif" fill="#737373" fill-opacity="0.5" font-weight="600" letter-spacing="0.8">REPEAT</text>
  <!-- Big X over the loop -->
  <line x1="345" y1="100" x2="445" y2="220" stroke="#171717" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="445" y1="100" x2="345" y2="220" stroke="#171717" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Connecting line: person to building -->
  <path d="M148 192 C150 192 153 192 153 192" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 3" stroke-opacity="0.7" fill="none"/>
</svg>
