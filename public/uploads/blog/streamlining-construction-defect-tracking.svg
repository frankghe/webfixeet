<svg viewBox="0 0 480 270" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-scd" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="#737373" stroke-width="0.3" stroke-opacity="0.2" fill="none"/>
    </pattern>
  </defs>
  <rect width="480" height="270" fill="url(#grid-scd)"/>

  <!-- LEFT: Crossed-out paper/spreadsheet -->
  <rect x="42" y="47" width="132" height="168" rx="5" fill="#e5e5e5" fill-opacity="0.6"/>
  <rect x="40" y="45" width="132" height="168" rx="5" stroke="#171717" stroke-width="1.8" fill="#e5e5e5" fill-opacity="0.25"/>
  <path d="M148 45 L172 45 L172 69 Z" stroke="#171717" stroke-width="1.2" fill="#e5e5e5" fill-opacity="0.4"/>
  <path d="M148 45 L172 69 L148 69 Z" stroke="#171717" stroke-width="1" fill="#e5e5e5" fill-opacity="0.6"/>

  <!-- Spreadsheet grid lines -->
  <line x1="40" y1="75" x2="172" y2="75" stroke="#737373" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="40" y1="100" x2="172" y2="100" stroke="#737373" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="40" y1="125" x2="172" y2="125" stroke="#737373" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="40" y1="150" x2="172" y2="150" stroke="#737373" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="40" y1="175" x2="172" y2="175" stroke="#737373" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="88" y1="45" x2="88" y2="213" stroke="#737373" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="130" y1="45" x2="130" y2="213" stroke="#737373" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Header row -->
  <rect x="50" y="61" width="28" height="5" rx="2" fill="#737373" fill-opacity="0.5"/>
  <rect x="95" y="61" width="22" height="5" rx="2" fill="#737373" fill-opacity="0.5"/>
  <rect x="137" y="61" width="18" height="5" rx="2" fill="#737373" fill-opacity="0.5"/>

  <!-- Row 1 -->
  <rect x="50" y="87" width="20" height="4" rx="1.5" fill="#737373" fill-opacity="0.3"/>
  <rect x="95" y="87" width="14" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <rect x="137" y="87" width="16" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <!-- Row 2 -->
  <rect x="50" y="112" width="26" height="4" rx="1.5" fill="#737373" fill-opacity="0.3"/>
  <rect x="95" y="112" width="22" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <rect x="137" y="112" width="20" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <!-- Row 3 -->
  <rect x="50" y="137" width="32" height="4" rx="1.5" fill="#737373" fill-opacity="0.3"/>
  <rect x="95" y="137" width="14" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <rect x="137" y="137" width="24" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <!-- Row 4 -->
  <rect x="50" y="162" width="20" height="4" rx="1.5" fill="#737373" fill-opacity="0.3"/>
  <rect x="95" y="162" width="22" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <rect x="137" y="162" width="16" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <!-- Row 5 -->
  <rect x="50" y="187" width="26" height="4" rx="1.5" fill="#737373" fill-opacity="0.3"/>
  <rect x="95" y="187" width="14" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <rect x="137" y="187" width="20" height="4" rx="1.5" fill="#737373" fill-opacity="0.25"/>

  <!-- Big cross-out X -->
  <line x1="50" y1="55" x2="162" y2="203" stroke="#171717" stroke-width="2.5" stroke-opacity="0.55" stroke-linecap="round"/>
  <line x1="162" y1="55" x2="50" y2="203" stroke="#171717" stroke-width="2.5" stroke-opacity="0.55" stroke-linecap="round"/>

  <!-- OLD WAY label -->
  <text x="106" y="232" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#737373" letter-spacing="1" font-weight="600">OLD WAY</text>

  <!-- CENTER: Arrow transition -->
  <path d="M188 135 C210 135 220 135 236 135" stroke="#E87020" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M230 128 L238 135 L230 142" stroke="#E87020" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- RIGHT: Digital tablet -->
  <rect x="252" y="37" width="182" height="188" rx="13" fill="#e5e5e5" fill-opacity="0.6"/>
  <rect x="250" y="35" width="182" height="188" rx="13" stroke="#171717" stroke-width="2" fill="#e5e5e5" fill-opacity="0.15"/>
  <rect x="262" y="50" width="158" height="158" rx="6" stroke="#171717" stroke-width="1" stroke-opacity="0.3" fill="#e5e5e5" fill-opacity="0.1"/>
  <rect x="319" y="229" width="44" height="8" rx="4" fill="#737373" fill-opacity="0.3"/>

  <!-- App header bar -->
  <rect x="262" y="50" width="158" height="26" rx="6" fill="#737373" fill-opacity="0.12"/>
  <rect x="262" y="64" width="158" height="12" fill="#737373" fill-opacity="0.12"/>
  <text x="341" y="67" text-anchor="middle" font-size="8.5" font-family="sans-serif" fill="#171717" font-weight="700" letter-spacing="0.4">Defect Tracker</text>
  <line x1="262" y1="76" x2="420" y2="76" stroke="#171717" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Checklist item 1 — done -->
  <rect x="270" y="84" width="142" height="26" rx="5" fill="#e5e5e5" fill-opacity="0.35"/>
  <circle cx="284" cy="97" r="8" fill="#E87020" fill-opacity="0.15" stroke="#E87020" stroke-width="1.5"/>
  <polyline points="279,97 283,101 290,92" stroke="#E87020" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="298" y="93" width="60" height="4.5" rx="2" fill="#737373" fill-opacity="0.4"/>
  <rect x="298" y="100" width="38" height="3.5" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <rect x="366" y="91" width="36" height="13" rx="6.5" fill="#E87020" fill-opacity="0.18"/>
  <text x="384" y="100.5" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#E87020" font-weight="700">DONE</text>

  <!-- Checklist item 2 — in progress -->
  <rect x="270" y="118" width="142" height="26" rx="5" fill="#e5e5e5" fill-opacity="0.35"/>
  <circle cx="284" cy="131" r="8" stroke="#737373" stroke-width="1.5" fill="none" stroke-dasharray="16 10"/>
  <rect x="298" y="127" width="52" height="4.5" rx="2" fill="#737373" fill-opacity="0.4"/>
  <rect x="298" y="134" width="33" height="3.5" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <rect x="359" y="125" width="42" height="13" rx="6.5" stroke="#737373" stroke-width="0.8" fill="none"/>
  <text x="380" y="134.5" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#737373" font-weight="600">IN PROG</text>

  <!-- Checklist item 3 — done -->
  <rect x="270" y="152" width="142" height="26" rx="5" fill="#e5e5e5" fill-opacity="0.35"/>
  <circle cx="284" cy="165" r="8" fill="#E87020" fill-opacity="0.15" stroke="#E87020" stroke-width="1.5"/>
  <polyline points="279,165 283,169 290,160" stroke="#E87020" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="298" y="161" width="56" height="4.5" rx="2" fill="#737373" fill-opacity="0.4"/>
  <rect x="298" y="168" width="40" height="3.5" rx="1.5" fill="#737373" fill-opacity="0.25"/>
  <rect x="366" y="159" width="36" height="13" rx="6.5" fill="#E87020" fill-opacity="0.18"/>
  <text x="384" y="168.5" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#E87020" font-weight="700">DONE</text>

  <!-- Progress bar -->
  <rect x="270" y="190" width="142" height="5" rx="2.5" fill="#737373" fill-opacity="0.15"/>
  <rect x="270" y="190" width="92" height="5" rx="2.5" fill="#E87020" fill-opacity="0.7"/>
  <text x="270" y="208" font-size="7.5" font-family="sans-serif" fill="#737373" font-weight="500">8 of 12 resolved</text>

  <!-- Notification badge -->
  <circle cx="415" cy="42" r="7" fill="#E87020"/>
  <text x="415" y="46" text-anchor="middle" font-size="8" font-family="sans-serif" fill="white" font-weight="700">2</text>

  <!-- DIGITAL label -->
  <text x="341" y="245" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#737373" letter-spacing="1" font-weight="600">DIGITAL</text>
</svg>
