<svg viewBox="0 0 480 270" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-wpm" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" stroke="#737373" stroke-width="0.3" stroke-opacity="0.2" fill="none"/>
    </pattern>
  </defs>
  <rect width="480" height="270" fill="url(#grid-wpm)"/>

  <!-- Building silhouette -->
  <rect x="40" y="60" width="120" height="158" rx="4" fill="#e5e5e5" fill-opacity="0.5"/>
  <rect x="38" y="58" width="120" height="158" rx="4" stroke="#171717" stroke-width="1.8"/>
  <rect x="38" y="58" width="120" height="22" rx="4" fill="#737373" fill-opacity="0.12"/>
  <text x="98" y="74" text-anchor="middle" font-size="7.5" font-family="sans-serif" fill="#737373" letter-spacing="0.8" font-weight="600">PROJECT</text>

  <!-- Windows -->
  <rect x="52" y="90" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="52" y="120" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="52" y="150" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="52" y="180" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="78" y="90" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="78" y="120" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="78" y="150" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="78" y="180" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="108" y="90" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="108" y="120" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="108" y="150" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="108" y="180" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="138" y="90" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="138" y="120" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="138" y="150" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>
  <rect x="138" y="180" width="15" height="12" rx="2" stroke="#171717" stroke-width="1" fill-opacity="0"/>

  <!-- Ground -->
  <rect x="28" y="216" width="144" height="6" rx="2" fill="#737373" fill-opacity="0.15"/>
  <line x1="28" y1="216" x2="172" y2="216" stroke="#171717" stroke-width="1.4"/>

  <!-- Shield / Guarantee symbol -->
  <ellipse cx="370" cy="120" rx="55" ry="60" fill="#3b82f6" fill-opacity="0.06"/>
  <path d="M370 68 L415 88 L415 120 Q415 152 370 168 Q325 152 325 120 L325 88 Z" stroke="#3b82f6" stroke-width="2" fill="#3b82f6" fill-opacity="0.1"/>
  <polyline points="352,118 364,130 390,104" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="370" y="150" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#3b82f6" font-weight="700" letter-spacing="1">BEDEK</text>

  <!-- Timeline strip -->
  <line x1="40" y1="248" x2="440" y2="248" stroke="#171717" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="40" cy="248" r="4" fill="#171717" fill-opacity="0.6"/>

  <!-- Milestone: Handover -->
  <line x1="100" y1="240" x2="100" y2="256" stroke="#171717" stroke-width="1.2" stroke-opacity="0.5"/>
  <circle cx="100" cy="248" r="5" fill="#e5e5e5" stroke="#171717" stroke-width="1.4"/>
  <text x="100" y="236" text-anchor="middle" font-size="6.5" font-family="sans-serif" fill="#737373" font-weight="600">HANDOVER</text>

  <!-- Warranty period band -->
  <rect x="100" y="244" width="220" height="8" rx="2" fill="#3b82f6" fill-opacity="0.2"/>
  <rect x="100" y="244" width="220" height="8" rx="2" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="210" y="241" text-anchor="middle" font-size="6.5" font-family="sans-serif" fill="#3b82f6" font-weight="700" letter-spacing="0.8">WARRANTY PERIOD</text>

  <!-- Milestone: 7-year mark -->
  <line x1="210" y1="240" x2="210" y2="256" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.7"/>
  <circle cx="210" cy="248" r="5" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Milestone: End -->
  <line x1="320" y1="240" x2="320" y2="256" stroke="#171717" stroke-width="1.2" stroke-opacity="0.5"/>
  <circle cx="320" cy="248" r="5" fill="#e5e5e5" stroke="#171717" stroke-width="1.4"/>
  <text x="320" y="262" text-anchor="middle" font-size="6.5" font-family="sans-serif" fill="#737373" font-weight="600">END</text>

  <!-- Timeline end arrow -->
  <path d="M434 244 L440 248 L434 252" stroke="#171717" stroke-width="1.4" stroke-opacity="0.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Clock icon -->
  <circle cx="436" cy="68" r="22" fill="#e5e5e5" fill-opacity="0.4" stroke="#171717" stroke-width="1.5"/>
  <line x1="436" y1="50" x2="436" y2="54" stroke="#171717" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="436" y1="82" x2="436" y2="86" stroke="#171717" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="418" y1="68" x2="422" y2="68" stroke="#171717" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="450" y1="68" x2="454" y2="68" stroke="#171717" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="436" y1="68" x2="436" y2="57" stroke="#171717" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="436" y1="68" x2="445" y2="74" stroke="#171717" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="436" cy="68" r="2" fill="#171717"/>

  <!-- Connecting line: building to shield -->
  <path d="M158 137 C210 137 270 120 325 118" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 3" stroke-opacity="0.6" fill="none"/>
  <circle cx="158" cy="137" r="3" fill="#3b82f6" fill-opacity="0.7"/>

  <!-- Connecting line: building to timeline -->
  <path d="M98 216 L100 244" stroke="#171717" stroke-width="1" stroke-dasharray="4 3" stroke-opacity="0.4" fill="none"/>
</svg>
