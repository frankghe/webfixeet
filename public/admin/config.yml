backend:
  name: github
  repo: frankghe/webfixeet
  branch: blog
  base_url: https://cms-auth.fixeet.co   # OAuth proxy URL

media_folder: "public/uploads"
public_folder: "/uploads"

i18n:
  structure: multiple_folders
  locales: [he, en]
  default_locale: he

collections:
  - name: blog
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    i18n: true
    format: frontmatter
    extension: md
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Excerpt", name: "excerpt", widget: "text", i18n: true }
      - { label: "Category", name: "category", widget: "select",
          options: ["Defect Management", "Construction Tech", "Best Practices", "Industry Insights"],
          i18n: duplicate }
      - { label: "Author", name: "author", widget: "string", i18n: duplicate }
      - { label: "Publish Date", name: "date", widget: "datetime", i18n: duplicate }
      - { label: "Read Time", name: "readTime", widget: "string", i18n: duplicate }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false, i18n: duplicate }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }
