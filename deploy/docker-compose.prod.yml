# Production Docker Compose for WebFixeet
# Run from project root:
#   docker compose -f deploy/docker-compose.prod.yml up -d

name: webfixeet

services:
  webfixeet:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file: ../.env.local
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    volumes:
      - ../downloads:/app/downloads:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # CMS OAuth proxy — authenticates admin users via GitHub OAuth
  # Required for Sveltia/Decap CMS admin panel at /admin
  cms-oauth:
    image: ghcr.io/njfamirm/decap-cms-github-backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3000"
    environment:
      OAUTH_GITHUB_CLIENT_ID: "${CMS_GITHUB_CLIENT_ID}"
      OAUTH_GITHUB_CLIENT_SECRET: "${CMS_GITHUB_CLIENT_SECRET}"
      OAUTH_GITHUB_SCOPE: "repo"
